apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keyvault-provider
spec:
  provider: azure
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: DATABASE_URL
          key: DATABASE_URL
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    keyvaultName: "{{ .Values.keyvault.name | default "my-keyvault" }}"
    tenantId: "{{ .Values.keyvault.tenantId | default "<tenant-id>" }}"
    objects: |
      array:
        - objectName: DATABASE_URL
          objectType: secret
          objectVersion: ""

# Note: For Azure Workload Identity, configure an Azure AD federated credential
# and add the client ID to the serviceAccount annotations in `values.yaml`.
