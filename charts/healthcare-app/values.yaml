replicaCount: 1
image:
  repository: myacr.azurecr.io/healthcare-app
  tag: "latest"
service:
  type: ClusterIP
  port: 8000
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 20

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: ""
  annotations: {}

keyvault:
  name: my-keyvault
  tenantId: ""
  objects:
    - objectName: DATABASE_URL
      objectType: secret
      secretName: db-credentials

